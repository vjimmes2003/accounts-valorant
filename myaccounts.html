<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rank Checker | Valorant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="tool-page">
  <div class="background-texture"></div>

  <nav class="valo-nav">
    <div class="nav-brand">
      <span class="v-logo">V</span>
      <span>RANK CHECKER</span>
    </div>
    <div class="nav-links">
      <a href="/">Volver a Mis Cuentas</a>
    </div>
  </nav>

  <main class="app-container centered">
    <div class="val-panel">
      <div class="panel-header">
        <h2>CONSULTA TU RANGO</h2>
        <p>Añade tus cuentas (Riot ID) e introduce tu HenrikDev API Key para consultar tu rango en tiempo real sin almacenarlo en nuestros servidores.</p>
      </div>

      <div class="form-grid">
        <div class="val-input-group">
          <label>RIOT ID (Nombre#Tag)</label>
          <input id="riotInput" type="text" placeholder="Ej: Jett#EUW" />
        </div>
        <div class="val-input-group">
          <label>API KEY (HenrikDev)</label>
          <input id="apiInput" type="password" placeholder="HDEV-XXXXX-XXXXX..." />
        </div>
      </div>

      <div class="form-actions">
        <button id="addBtn" class="btn valo-btn-outline">AÑADIR A LA LISTA</button>
        <button id="scanBtn" class="btn valo-btn">OBTENER RANGOS</button>
      </div>
    </div>

    <div class="val-panel list-panel">
      <div class="panel-header">
        <h2>TUS CUENTAS</h2>
      </div>
      <div id="accountList" class="my-accounts-list">
        </div>
    </div>
  </main>

  <script src="/myaccounts.js"></script>
</body>
</html>
